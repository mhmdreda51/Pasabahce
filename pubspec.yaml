name: pasabahce
description: A new Flutter project.


version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^7.3.0
  dio: ^4.0.0
  shared_preferences: ^2.0.8
  smooth_page_indicator: ^1.0.0+2
  firebase_core: ^1.19.2
  firebase_auth: ^3.4.2
  firebase_messaging: ^12.0.0
  get_storage: ^2.0.3
  connectivity_plus: ^2.3.5
  easy_localization: ^3.0.1
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^9.2.0
  fluttertoast: ^8.0.9
  cloud_firestore: ^3.3.0
  google_sign_in: ^5.4.0
  flutter_facebook_auth: ^4.4.0+1
  pin_code_fields: ^7.3.0
  flutter_svg: any
  url_launcher: any
  one_context: ^1.1.1
  image_picker: ^0.8.4+4
  firebase_storage: ^10.3.3
  badges: ^2.0.3
  flutter_rating_bar: ^4.0.1
  shimmer: ^2.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^1.0.0
  flutter_native_splash: ^2.0.2
  flutter_launcher_icons: ^0.9.2
  flutter_app_name: ^0.1.0



flutter_native_splash:
  color: "#000000"
  image: assets/images/logo.png
  color_dark: "#000000"
  image_dark: assets/images/Gulcehre_ibrik.png
  android: true
  ios: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
flutter_app_name:
  name: "Pasabahce"



flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translation/



