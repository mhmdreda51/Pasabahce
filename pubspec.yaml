name: pasabahce
description: A new Flutter project.


version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^7.3.0
  dio: ^4.0.0
  shared_preferences: ^2.0.8
  smooth_page_indicator: ^1.0.0+2
  firebase_core: ^1.19.2
  firebase_auth: ^3.4.2
  firebase_messaging: ^12.0.0
  get_storage: ^2.0.3
  connectivity_plus: ^2.3.5
  easy_localization: ^3.0.1
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^1.0.0
  flutter_native_splash: ^2.0.2
  flutter_launcher_icons: ^0.9.2
  flutter_app_name: ^0.1.0



flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  color_dark: "#0B305D"
  image_dark: assets/images/logo.png
  android: true
  ios: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
flutter_app_name:
  name: "Pasabahce"



flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translation/



